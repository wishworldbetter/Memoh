name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Existing release tag to rebuild, e.g. v0.7.0"
        required: true

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.inputs.tag_name || github.ref_name }}
  cancel-in-progress: false

env:
  RELEASE_TAG: ${{ github.event.inputs.tag_name || github.ref_name }}

jobs:
  changelog:
    name: Generate changelog
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          registry-url: https://registry.npmjs.org/

      - run: pnpm dlx changelogithub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  npm-publish:
    name: Publish npm packages
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Sync workspace versions
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${RELEASE_TAG#v}"
          export VERSION
          node <<'EOF'
          const fs = require('fs');
          const path = require('path');
          const version = process.env.VERSION;
          const targets = [
            'package.json',
            'packages/sdk/package.json',
            'packages/ui/package.json',
            'packages/icons/package.json',
            'packages/config/package.json',
            'apps/web/package.json',
            'apps/desktop/package.json',
          ];
          for (const target of targets) {
            if (!fs.existsSync(target)) continue;
            const pkg = JSON.parse(fs.readFileSync(target, 'utf8'));
            pkg.version = version;
            fs.writeFileSync(target, `${JSON.stringify(pkg, null, 2)}\n`);
          }
          EOF
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm
          registry-url: https://registry.npmjs.org/
      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile
      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm publish:npm

  desktop-build:
    name: Build desktop (${{ matrix.artifact_flavor }} ${{ matrix.platform }})
    runs-on: ${{ matrix.platform }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-26
            build_cmd: build:mac
            flavor: online
            artifact_flavor: online
          - platform: macos-26
            build_cmd: build:mac
            flavor: offline
            artifact_flavor: local
          - platform: ubuntu-22.04
            build_cmd: build:linux:x64
            flavor: online
            artifact_flavor: online
          - platform: ubuntu-22.04
            build_cmd: build:linux:x64
            flavor: offline
            artifact_flavor: local
          - platform: windows-latest
            build_cmd: build:win:x64
            flavor: online
            artifact_flavor: online
          - platform: windows-latest
            build_cmd: build:win:x64
            flavor: offline
            artifact_flavor: local
    env:
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      MEMOH_DESKTOP_FLAVOR: ${{ matrix.flavor }}
    steps:
      - uses: actions/checkout@v4
      - name: Sync desktop version
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${RELEASE_TAG#v}"
          export VERSION
          node <<'EOF'
          const fs = require('fs');
          const version = process.env.VERSION;
          const packageJsonPath = 'apps/desktop/package.json';
          const packageJson = JSON.parse(fs.readFileSync(packageJsonPath, 'utf8'));
          packageJson.version = version;
          fs.writeFileSync(packageJsonPath, `${JSON.stringify(packageJson, null, 2)}\n`);
          EOF
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm
      - uses: actions/setup-go@v5
        if: ${{ matrix.flavor == 'offline' }}
        with:
          go-version-file: go.mod
          cache: true
      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile
      - name: Cache desktop GStreamer runtime
        if: ${{ matrix.flavor == 'offline' }}
        uses: actions/cache@v4
        with:
          path: apps/desktop/resources/gstreamer
          key: ${{ runner.os }}-desktop-gstreamer-${{ hashFiles('apps/desktop/scripts/prepare-gstreamer.mjs') }}
          restore-keys: |
            ${{ runner.os }}-desktop-gstreamer-
      - name: Require macOS signing and notarization secrets
        if: ${{ startsWith(matrix.platform, 'macos-') }}
        shell: bash
        run: |
          set -euo pipefail
          missing=()
          [[ -n "${APPLE_CERTIFICATE:-}" ]] || missing+=("APPLE_CERTIFICATE")
          [[ -n "${APPLE_CERTIFICATE_PASSWORD:-}" ]] || missing+=("APPLE_CERTIFICATE_PASSWORD")
          [[ -n "${APPLE_API_KEY:-}" ]] || missing+=("APPLE_API_KEY")
          [[ -n "${APPLE_API_KEY_ID:-}" ]] || missing+=("APPLE_API_KEY_ID")
          [[ -n "${APPLE_API_ISSUER:-}" ]] || missing+=("APPLE_API_ISSUER")

          if (( ${#missing[@]} > 0 )); then
            printf 'Missing required macOS release secret(s):\n' >&2
            printf '  - %s\n' "${missing[@]}" >&2
            exit 1
          fi
      - name: Prepare macOS signing and notarization
        id: mac-signing
        if: ${{ startsWith(matrix.platform, 'macos-') }}
        shell: bash
        run: |
          set -euo pipefail
          CSC_PATH="$RUNNER_TEMP/certificate.p12"
          printf '%s' "$APPLE_CERTIFICATE" | base64 --decode > "$CSC_PATH"
          echo "CSC_LINK=$CSC_PATH" >> "$GITHUB_ENV"
          echo "CSC_KEY_PASSWORD=$APPLE_CERTIFICATE_PASSWORD" >> "$GITHUB_ENV"
          API_KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          printf '%b' "$APPLE_API_KEY" | tr -d '\r' > "$API_KEY_PATH"
          chmod 600 "$API_KEY_PATH"
          echo "APPLE_API_KEY=$API_KEY_PATH" >> "$GITHUB_ENV"
          echo "has_cert=true" >> "$GITHUB_OUTPUT"
      - name: Build desktop bundles
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ steps.mac-signing.outputs.has_cert == 'true' && 'true' || 'false' }}
          MEMOH_DESKTOP_FLAVOR: ${{ matrix.flavor }}
        run: pnpm --filter @memohai/desktop ${{ matrix.build_cmd }}
      - name: Notarize macOS DMGs
        if: ${{ startsWith(matrix.platform, 'macos-') && steps.mac-signing.outputs.has_cert == 'true' }}
        shell: bash
        run: |
          set -euo pipefail

          shopt -s nullglob
          if [[ "$MEMOH_DESKTOP_FLAVOR" == "online" ]]; then
            dmg_artifacts=(apps/desktop/dist/Memoh-[0-9]*-mac-arm64.dmg apps/desktop/dist/Memoh-[0-9]*-mac-x64.dmg)
          else
            dmg_artifacts=(apps/desktop/dist/Memoh-Local-*-mac-arm64.dmg apps/desktop/dist/Memoh-Local-*-mac-x64.dmg)
          fi
          if (( ${#dmg_artifacts[@]} != 2 )); then
            echo "Expected mac arm64/x64 dmg artifacts." >&2
            ls -lh apps/desktop/dist || true
            exit 1
          fi

          for dmg in "${dmg_artifacts[@]}"; do
            xcrun notarytool submit "$dmg" \
              --key "$APPLE_API_KEY" \
              --key-id "$APPLE_API_KEY_ID" \
              --issuer "$APPLE_API_ISSUER" \
              --wait
            xcrun stapler staple "$dmg"
          done
      - name: Verify macOS bundles
        if: ${{ startsWith(matrix.platform, 'macos-') && steps.mac-signing.outputs.has_cert == 'true' }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ "$MEMOH_DESKTOP_FLAVOR" == "online" ]]; then
            declare -a bundles=(
              "arm64:__none__:apps/desktop/dist/mac-arm64/Memoh.app"
              "x64:__none__:apps/desktop/dist/mac/Memoh.app"
            )
          else
            declare -a bundles=(
              "arm64:darwin-arm64:apps/desktop/dist/mac-arm64/Memoh Local.app"
              "x64:darwin-x64:apps/desktop/dist/mac/Memoh Local.app"
            )
          fi

          for bundle in "${bundles[@]}"; do
            IFS=: read -r arch qdrant_target app_path <<<"$bundle"

            if [[ ! -d "$app_path" ]]; then
              echo "Missing $arch app bundle: $app_path" >&2
              exit 1
            fi

            if [[ "$MEMOH_DESKTOP_FLAVOR" == "online" ]]; then
              for local_resource in server cli runtime config providers qdrant gstreamer; do
                if [[ -e "$app_path/Contents/Resources/$local_resource" ]]; then
                  echo "Unexpected local-only resource in online $arch app: $local_resource" >&2
                  exit 1
                fi
              done
            else
              for local_resource in server cli runtime config providers qdrant gstreamer; do
                if [[ ! -e "$app_path/Contents/Resources/$local_resource" ]]; then
                  echo "Missing local resource in local $arch app: $local_resource" >&2
                  exit 1
                fi
              done

              qdrant_root="$app_path/Contents/Resources/qdrant"
              qdrant_bin="$qdrant_root/$qdrant_target/qdrant"
              if [[ ! -x "$qdrant_bin" ]]; then
                echo "Missing $arch qdrant binary: $qdrant_bin" >&2
                find "$qdrant_root" -maxdepth 3 -type f -print || true
                exit 1
              fi

              extra_qdrant_dirs="$(find "$qdrant_root" -mindepth 1 -maxdepth 1 -type d ! -name "$qdrant_target" -print -quit)"
              if [[ -n "$extra_qdrant_dirs" ]]; then
                echo "Unexpected qdrant resource in $arch app: $extra_qdrant_dirs" >&2
                find "$qdrant_root" -mindepth 1 -maxdepth 1 -type d -print
                exit 1
              fi
            fi

            codesign --verify --deep --strict --verbose=2 "$app_path"
            codesign -dv --verbose=4 "$app_path" 2>&1 | grep -F "Developer ID Application"
            spctl --assess --type execute --verbose=4 "$app_path"
          done

          shopt -s nullglob
          if [[ "$MEMOH_DESKTOP_FLAVOR" == "online" ]]; then
            dmg_artifacts=(apps/desktop/dist/Memoh-[0-9]*-mac-arm64.dmg apps/desktop/dist/Memoh-[0-9]*-mac-x64.dmg)
          else
            dmg_artifacts=(apps/desktop/dist/Memoh-Local-*-mac-arm64.dmg apps/desktop/dist/Memoh-Local-*-mac-x64.dmg)
          fi
          if (( ${#dmg_artifacts[@]} != 2 )); then
            echo "Expected mac arm64/x64 dmg artifacts." >&2
            ls -lh apps/desktop/dist || true
            exit 1
          fi

          for dmg in "${dmg_artifacts[@]}"; do
            codesign --verify --verbose=2 "$dmg"
            xcrun stapler validate "$dmg"
            spctl --assess --type open --context context:primary-signature --verbose=4 "$dmg"
          done
      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.artifact_flavor }}-${{ matrix.platform }}
          path: |
            apps/desktop/dist/*.AppImage
            apps/desktop/dist/*.deb
            apps/desktop/dist/*.rpm
            apps/desktop/dist/*.dmg
            apps/desktop/dist/*.exe
          if-no-files-found: error

  desktop-upload:
    name: Upload desktop artifacts
    runs-on: ubuntu-latest
    needs: [changelog, desktop-build]
    if: ${{ always() && needs.desktop-build.result == 'success' && (needs.changelog.result == 'success' || needs.changelog.result == 'skipped') }}
    steps:
      - name: Download desktop artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts/desktop
          pattern: desktop-*
          merge-multiple: true
      - name: Publish desktop assets
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ env.RELEASE_TAG }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(
            release-artifacts/desktop/*.AppImage
            release-artifacts/desktop/*.deb
            release-artifacts/desktop/*.rpm
            release-artifacts/desktop/*.dmg
            release-artifacts/desktop/*.exe
          )
          if [[ ${#files[@]} -eq 0 ]]; then
            echo "No desktop artifacts found" >&2
            exit 1
          fi
          gh release upload "$TAG_NAME" "${files[@]}" --clobber --repo "$GH_REPO"
