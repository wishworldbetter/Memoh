appId: ai.memoh.desktop
productName: Memoh Local
copyright: Copyright © 2026 Memoh
directories:
  buildResources: build
  output: dist
files:
  - out/**/*
  - package.json
  - resources/icon.png
  - resources/tray-icon.png
  - "!**/.vscode/*"
  - "!src/*"
  - "!scripts/*"
  - "!AGENTS.md"
  - "!electron.vite.config.{js,ts,mjs,cjs}"
  - "!{.eslintrc.cjs,.eslintignore,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}"
  - "!{.env,.env.*,.npmrc,pnpm-lock.yaml}"
  - "!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}"
extraResources:
  - from: resources/server
    to: server
  - from: resources/cli
    to: cli
  - from: resources/runtime
    to: runtime
  - from: resources/config
    to: config
  - from: resources/providers
    to: providers
  - from: resources/qdrant
    to: qdrant
    filter:
      - ${env.MEMOH_DESKTOP_QDRANT_TARGET}/**/*
  - from: resources/gstreamer
    to: gstreamer
    filter:
      - ${env.MEMOH_DESKTOP_GSTREAMER_TARGET}/**/*
mac:
  category: public.app-category.productivity
  target:
    - dmg
  icon: build/icon.icon
  artifactName: Memoh-Local-${version}-mac-${arch}.${ext}
  notarize: true
dmg:
  icon: build/icon.icns
  sign: true
linux:
  category: Utility
  executableName: memoh-local
  packageName: memoh-local
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
    - target: rpm
      arch: [x64]
  maintainer: Memoh
  icon: build/icon.png
  artifactName: Memoh-Local-${version}-linux-${arch}.${ext}
win:
  target:
    - target: nsis
      arch: [x64]
  icon: build/icon.ico
  artifactName: Memoh-Local-${version}-win-${arch}-setup.${ext}
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
npmRebuild: false
