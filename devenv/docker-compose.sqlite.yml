name: "memoh-dev-sqlite"
services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: memoh-dev-sqlite-qdrant
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "${MEMOH_SQLITE_DEV_QDRANT_HTTP_PORT:-17333}:6333"
      - "${MEMOH_SQLITE_DEV_QDRANT_GRPC_PORT:-17334}:6334"
    healthcheck:
      test: ["CMD-SHELL", "timeout 5s bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  deps:
    build:
      context: ..
      dockerfile: devenv/Dockerfile.web
    container_name: memoh-dev-sqlite-deps
    working_dir: /workspace
    command: ["pnpm", "install"]
    environment:
      CI: "true"
      ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
    volumes:
      - ..:/workspace
      - node_modules:/workspace/node_modules
      - pnpm_store:/root/.local/share/pnpm/store
    restart: "no"

  migrate:
    build:
      context: ..
      dockerfile: devenv/Dockerfile.server
    container_name: memoh-dev-sqlite-migrate
    working_dir: /workspace
    entrypoint: []
    command: ["go", "run", "./cmd/agent", "migrate", "up"]
    environment:
      CONFIG_PATH: /workspace/devenv/app.sqlite.dev.toml
      GOFLAGS: -buildvcs=false
    volumes:
      - ..:/workspace
      - go_mod_cache:/go/pkg/mod
      - go_build_cache:/root/.cache/go-build
      - memoh_data:/opt/memoh/data
    depends_on:
      qdrant:
        condition: service_healthy
    restart: "no"

  server:
    build:
      context: ..
      dockerfile: devenv/Dockerfile.server
    container_name: memoh-dev-sqlite-server
    working_dir: /workspace
    privileged: true
    pid: host
    command: ["air", "-c", ".air.toml"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      CONFIG_PATH: /workspace/devenv/app.sqlite.dev.toml
      GOFLAGS: -buildvcs=false
      # Proxy: use host.docker.internal for localhost proxies, e.g.
      #   HTTP_PROXY=http://host.docker.internal:7890 mise run dev:sqlite
      HTTP_PROXY: "${HTTP_PROXY:-${http_proxy:-}}"
      HTTPS_PROXY: "${HTTPS_PROXY:-${https_proxy:-}}"
      NO_PROXY: "${NO_PROXY:-127.0.0.1,localhost},qdrant,sparse,server,web,migrate,deps,memoh-dev-sqlite-qdrant,memoh-dev-sqlite-sparse,memoh-dev-sqlite-server,memoh-dev-sqlite-web,memoh-dev-sqlite-migrate,memoh-dev-sqlite-deps"
      http_proxy: "${http_proxy:-${HTTP_PROXY:-}}"
      https_proxy: "${https_proxy:-${HTTPS_PROXY:-}}"
      no_proxy: "${no_proxy:-${NO_PROXY:-127.0.0.1,localhost}},qdrant,sparse,server,web,migrate,deps,memoh-dev-sqlite-qdrant,memoh-dev-sqlite-sparse,memoh-dev-sqlite-server,memoh-dev-sqlite-web,memoh-dev-sqlite-migrate,memoh-dev-sqlite-deps"
      MEMOH_DISPLAY_WEBRTC_UDP_PORT_MIN: "${MEMOH_SQLITE_DEV_DISPLAY_WEBRTC_UDP_PORT_MIN:-30200}"
      MEMOH_DISPLAY_WEBRTC_UDP_PORT_MAX: "${MEMOH_SQLITE_DEV_DISPLAY_WEBRTC_UDP_PORT_MAX:-30300}"
    volumes:
      - ..:/workspace
      - go_mod_cache:/go/pkg/mod
      - go_build_cache:/root/.cache/go-build
      - containerd_data:/var/lib/containerd
      - server_cni_state:/var/lib/cni
      - memoh_data:/opt/memoh/data
      # Expose host CDI specs to the nested containerd used for bot workspaces.
      - /etc/cdi:/etc/cdi:ro
      - /var/run/cdi:/var/run/cdi:ro
      # Toolkit: run ./docker/toolkit/install.sh once before first use
      - ../.toolkit:/opt/memoh/runtime/toolkit
      - ../docker/toolkit/bin:/opt/memoh/runtime/toolkit/bin
      - ../cmd/bridge/template:/opt/memoh/runtime/templates
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "${MEMOH_SQLITE_DEV_SERVER_PORT:-19080}:8080"
      - "${MEMOH_SQLITE_DEV_OAUTH_PORT:-1555}:8080"
      - "${MEMOH_SQLITE_DEV_DISPLAY_WEBRTC_UDP_PORT_MIN:-30200}-${MEMOH_SQLITE_DEV_DISPLAY_WEBRTC_UDP_PORT_MAX:-30300}:${MEMOH_SQLITE_DEV_DISPLAY_WEBRTC_UDP_PORT_MIN:-30200}-${MEMOH_SQLITE_DEV_DISPLAY_WEBRTC_UDP_PORT_MAX:-30300}/udp"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:8080/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
    depends_on:
      migrate:
        condition: service_completed_successfully
      qdrant:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: ..
      dockerfile: devenv/Dockerfile.web
    container_name: memoh-dev-sqlite-web
    working_dir: /workspace/apps/web
    command: ["pnpm", "exec", "vite", "--host", "0.0.0.0", "--port", "8082"]
    environment:
      MEMOH_CONFIG_PATH: /workspace/devenv/app.sqlite.dev.toml
      MEMOH_WEB_PROXY_TARGET: http://server:8080
    volumes:
      - ..:/workspace
      - node_modules:/workspace/node_modules
    ports:
      - "${MEMOH_SQLITE_DEV_WEB_PORT:-19082}:8082"
    depends_on:
      deps:
        condition: service_completed_successfully
      server:
        condition: service_healthy
    restart: unless-stopped

  sparse:
    build:
      context: ..
      dockerfile: docker/Dockerfile.sparse
    container_name: memoh-dev-sqlite-sparse
    ports:
      - "${MEMOH_SQLITE_DEV_SPARSE_PORT:-19085}:8085"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8085/health')\" || exit 1"]
      interval: 15s
      timeout: 10s
      start_period: 30s
      retries: 3
    restart: unless-stopped

volumes:
  qdrant_data:
    driver: local
  go_mod_cache:
    driver: local
  go_build_cache:
    driver: local
  containerd_data:
    driver: local
  memoh_data:
    driver: local
  server_cni_state:
    driver: local
  node_modules:
    driver: local
  pnpm_store:
    driver: local
